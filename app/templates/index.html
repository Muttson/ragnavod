<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RAGNAVOD - Protocol Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        video { width: 100%; border: 2px solid #333; border-radius: 8px; background: #000; }
        .controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 20px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #1557b0; }
        .btn-send { background: #28a745; }
        .btn-send:hover { background: #218838; }
        .metrics { margin-top: 20px; padding: 15px; background: #1e1e1e; border-radius: 8px; text-align: left; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .metrics h3 { grid-column: span 2; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .status-tag { color: #00ff00; font-weight: bold; }
        .metric-value { color: #ffb74d; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RAGNAVOD <span style="font-size: 0.5em; color: #666;">VOD System v1.0</span></h1>
        
        <video id="video" controls muted></video>

        <div class="controls">
            <button onclick="loadVideo('bubbles')">Bubbles</button>
            <button onclick="loadVideo('fishing')">Fishing</button>
            <button onclick="loadVideo('flower')">Flower</button>
            <button onclick="loadVideo('dune')">Dune</button>
            <button class="btn-send" onclick="handleSendMetrics()">🚀 Enviar Reporte al Búnker</button>
        </div>

        <div class="metrics">
            <h3>Laboratorio de Métricas</h3>
            <p>Video Actual: <span id="current-video" class="metric-value">-</span></p>
            <p>Protocolo: <span class="status-tag" id="protocol-info">Detectando...</span></p>
            <p>TTFF: <span id="metric-ttff" class="metric-value">0</span> ms</p>
            <p>Carga de Fragmento (Promedio): <span id="metric-frag" class="metric-value">0</span> ms</p>
            <p>Micro-cortes (Re-buffer): <span id="metric-stall" class="metric-value">0</span></p>
            <p>Inter-arrival Jitter: <span id="metric-inter-jitter" class="metric-value">0</span> ms</p>
            <p>Estabilidad (Jitter): <span id="metric-jitter" class="metric-value">0</span> ms</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const hls = new Hls({
            maxBufferLength: 30, 
            maxMaxBufferLength: 60
        });
        
        // --- Variables Globales de Métricas ---
        let fragmentTimes = [];
        let stallCount = 0;
        let startTime = 0;
        let ttff_ms = 0;
        let isFirstPlay = true;
        let currentVideoName = "";
        let isPlaying = false;
        let metricsMonitorInterval = null;

        // 1. Fragment Load Time (Hls.js v1+ API) - Captura en tiempo real
        hls.on(Hls.Events.FRAG_BUFFERED, (event, data) => {
            try {
                const stats = data.frag.stats.loading;
                if (stats.start && stats.end) {
                    const duration = stats.end - stats.start;
                    fragmentTimes.push(duration);
                    
                    // Actualizar UI en tiempo real
                    updateFragmentMetrics();
                }
            } catch (e) {
                console.warn("No se pudieron leer las métricas del fragmento", e);
            }
        });

        // Función auxiliar para actualizar métricas de fragmentos usando el historial completo
        function updateFragmentMetrics() {
            if (fragmentTimes.length > 0) {
                const totalFragments = fragmentTimes.length;
                const averageFragmentTime = fragmentTimes.reduce((a, b) => a + b, 0) / totalFragments;
                const interArrivalJitter = calculateInterArrivalJitter(fragmentTimes);
                const stabilityJitter = calculateJitter(fragmentTimes);

                document.getElementById('metric-frag').innerText = averageFragmentTime.toFixed(2);
                document.getElementById('metric-inter-jitter').innerText = interArrivalJitter.toFixed(2);
                document.getElementById('metric-jitter').innerText = stabilityJitter.toFixed(2);
            }
        }

        // 2. Re-buffering Events
        hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.details === Hls.ErrorDetails.BUFFER_STALLED_ERROR) {
                stallCount++;
                document.getElementById('metric-stall').innerText = stallCount;
            }
        });

        // 3. Time to First Frame (TTFF)
        video.addEventListener('playing', () => {
            if (isFirstPlay) {
                ttff_ms = performance.now() - startTime;
                document.getElementById('metric-ttff').innerText = ttff_ms.toFixed(2);
                isFirstPlay = false;
                isPlaying = true;
                
                // Iniciar monitoreo continuo de métricas
                startMetricsMonitoring();
            }
        });

        // Monitoreo continuo de métricas durante la reproducción
        function startMetricsMonitoring() {
            if (metricsMonitorInterval) clearInterval(metricsMonitorInterval);
            
            metricsMonitorInterval = setInterval(() => {
                if (isPlaying) {
                    // Actualizar fragmentos en tiempo real
                    updateFragmentMetrics();
                }
            }, 500);
        }

        // Detener monitoreo cuando se pausa o termina
        video.addEventListener('pause', () => {
            isPlaying = false;
            if (metricsMonitorInterval) clearInterval(metricsMonitorInterval);
        });

        video.addEventListener('ended', () => {
            isPlaying = false;
            if (metricsMonitorInterval) clearInterval(metricsMonitorInterval);
        });

        function calculateJitter(times) {
            if (times.length < 2) return 0;
            let sumDiff = 0;
            for (let i = 1; i < times.length; i++) {
                sumDiff += Math.abs(times[i] - times[i - 1]);
            }
            return sumDiff / (times.length - 1);
        }

        // Calcular Inter-arrival Jitter (Desviación Estándar de tiempos de carga)
        function calculateInterArrivalJitter(times) {
            if (times.length < 2) return 0;
            
            // Calcular media
            const mean = times.reduce((a, b) => a + b, 0) / times.length;
            
            // Calcular varianza
            const variance = times.reduce((sum, time) => sum + Math.pow(time - mean, 2), 0) / times.length;
            
            // Desviación estándar (raíz cuadrada de varianza)
            return Math.sqrt(variance);
        }

        function loadVideo(name) {
            // Reiniciar métricas
            fragmentTimes = [];
            stallCount = 0;
            ttff_ms = 0;
            isFirstPlay = true;
            currentVideoName = name;
            startTime = performance.now();
            
            // Limpiar UI
            document.getElementById('current-video').innerText = name;
            document.getElementById('protocol-info').innerText = "Detectando...";
            document.getElementById('metric-ttff').innerText = "0";
            document.getElementById('metric-frag').innerText = "0";
            document.getElementById('metric-stall').innerText = "0";
            document.getElementById('metric-inter-jitter').innerText = "0";
            document.getElementById('metric-jitter').innerText = "0";

            const url = `/streams/${name}/index.m3u8`;

            if (Hls.isSupported()) {
                hls.loadSource(url);
                hls.attachMedia(video);
                
                hls.once(Hls.Events.MANIFEST_PARSED, () => {
                    // Extraer protocolo
                    setTimeout(() => {
                        const entries = window.performance.getEntriesByType('resource');
                        const manifestEntry = entries.find(r => r.name.includes('.m3u8'));
                        
                        if (manifestEntry) {
                            document.getElementById('protocol-info').innerText = manifestEntry.nextHopProtocol || "H2/H3";
                        }
                    }, 500);
                    
                    video.play().catch(e => console.log("Autoplay prevenido."));
                });
            }
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => video.play());
            }
        }

        async function handleSendMetrics() {
            if (!currentVideoName) {
                alert("Primero selecciona un video.");
                return;
            }
            if (isFirstPlay && ttff_ms === 0) {
                alert("Espera a que el video inicie para capturar el TTFF.");
                return;
            }
            await sendMetrics(currentVideoName);
        }

        async function sendMetrics(videoName) {
            const totalFragments = fragmentTimes.length;
            const averageFragmentTime = totalFragments > 0 
                ? fragmentTimes.reduce((a, b) => a + b, 0) / totalFragments 
                : 0;
            const interArrivalJitter = totalFragments > 0 ? calculateInterArrivalJitter(fragmentTimes) : 0;
            const stabilityJitter = totalFragments > 0 ? calculateJitter(fragmentTimes) : 0;
            const protocolStr = document.getElementById('protocol-info').innerText;

            // Garantizar que TODOS los valores sean números válidos (nunca null ni undefined)
            const payload = {
                video_name: videoName || "unknown",
                protocol: protocolStr || "Unknown",
                ttff_ms: Math.max(0, parseFloat(ttff_ms.toFixed(2)) || 0),
                fragment_load_time_ms: Math.max(0, parseFloat(averageFragmentTime.toFixed(2)) || 0),
                rebuffering_events: Math.max(0, parseInt(stallCount) || 0),
                inter_arrival_jitter_ms: Math.max(0, parseFloat(interArrivalJitter.toFixed(2)) || 0),
                jitter_ms: Math.max(0, parseFloat(stabilityJitter.toFixed(2)) || 0)
            };

            try {
                const response = await fetch('/api/log_metrics', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if(response.ok) {
                    alert("✅ Métricas enviadas al búnker con éxito.");
                } else {
                    const errDetail = await response.text();
                    alert(`❌ Error al enviar métricas: ${errDetail}`);
                }
            } catch (err) {
                console.error("Error de red:", err);
                alert("❌ No se pudo conectar con el servidor.");
            }
        }
    </script>
</body>
</html>
